<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCE mobili | Ambientes que expressam quem você é</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- Pré-load para tipografia (Aktiv Grotesk simulado via style css, use local ou adobe fonts) -->
</head>
<body>

    <!-- Logo Fixa Topo -->
    <header class="fixed-ui">
        <div class="logo">NOCE</div>
    </header>

    <!-- Flutuante Whats -->
    <a href="https://wa.me/5511965665065" class="whatsapp-btn" target="_blank">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
    </a>

    <!-- MAIN SCROLL CONTAINER PARA LENIS -->
    <main id="app">
        <!-- Sec 0: Hero -->
        <section class="section hero" id="sec-hero">
            <div class="hero-bg" style="background-image: url('/images/placeholder.jpg');"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-logo"></h1>
                <p class="hero-tagline"></p>
            </div>
        </section>

        <!-- Sec 1: Manifesto -->
        <section class="section manifesto">
            <div class="manifesto-wrap">
                <div class="m-head-left"><h2 class="m-part1">Ambientes que não</h2></div>
                <div class="m-head-right"><h2 class="m-part2">precisam se explicar.</h2></div>
            </div>
            <div class="manifesto-body">
                <p class="m-body"></p>
            </div>
        </section>

        <!-- Ambientes Dinâmicos (Preenchidos via JS) -->
        <div id="ambientes-container">
            <!-- Pinned Sections & Horizontal Scroll injected here -->
        </div>

        <!-- Sec Acabamentos (Gravidade Zero) -->
        <section class="section acabamentos-sec">
            <h2 class="section-entry-word">MATERIALIDADE</h2>
            <div class="acabamentos-wrapper">
                <!-- Swatches injetados via JS -->
            </div>
        </section>

        <!-- Sec Processo -->
        <section class="section processo">
            <div class="proc-head">
                <h2 class="proc-title">O Nosso Processo</h2>
            </div>
            <div class="proc-linha-progresso"></div>
            <div class="proc-steps">
                <div class="step"><div class="step-num">1</div><p>Escuta</p></div>
                <div class="step"><div class="step-num">2</div><p>Curadoria</p></div>
                <div class="step"><div class="step-num">3</div><p>Projeto</p></div>
                <div class="step"><div class="step-num">4</div><p>Entrega</p></div>
            </div>
        </section>

        <!-- Sec Parceiros (Spotlight) -->
        <section class="section parceiros-sec">
            <h2 class="parceiros-title">Parceiros</h2>
            <div class="parceiros-spotlight">
                <!-- Logos injetados via JS -->
            </div>
        </section>

        <!-- Sec Instagram -->
        <section class="section instagram-strip" style="display:none;">
            <h3>No Instagram <br> <span>@nocemobili</span></h3>
            <div class="insta-horizontal">
                <!-- Strip injetada -->
            </div>
        </section>

        <!-- Sec Contato -->
        <section class="section contato">
            <h1 class="cta-headline"></h1>
            <div class="cta-btns">
                <a href="#" class="btn btn-outline" id="btn-whats">Falar no WhatsApp</a>
                <a href="#" class="btn btn-outline" id="btn-insta">Ver no Instagram</a>
            </div>
            <footer class="minimal-footer">
                <p>© 2026 NOCE mobili. Todos os direitos reservados.</p>
            </footer>
        </section>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
